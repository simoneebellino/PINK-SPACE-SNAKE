<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE: PLANET HER EDITION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle, #5e055e 0%, #210124 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Schermata Iniziale */
        #home-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s;
        }

        #home-screen h1 {
            color: #ff00ff;
            font-size: 5rem;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #aa00ff;
            margin-bottom: 30px;
            letter-spacing: 10px;
        }

        #start-btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: transparent;
            color: #fff;
            border: 2px solid #ff00ff;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 15px #ff00ff;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: #ff00ff;
            box-shadow: 0 0 30px #ff00ff;
            transform: scale(1.1);
        }

        /* UI Gioco */
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            background: rgba(0, 0, 0, 0.4);
        }

        #score-board {
            position: absolute;
            top: -50px;
            left: 0;
            color: #ffb7ff;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>PLANET HER</h1>
        <button id="start-btn">START MISSION</button>
    </div>

    <div id="game-container">
        <div id="score-board">Punti: <span id="score">0</span> | Prossimo: <span id="target">Carota</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const homeScreen = document.getElementById("home-screen");
        const scoreEl = document.getElementById("score");
        const targetEl = document.getElementById("target");

        // Impostazioni a schermo intero dinamiche
        const gridSize = 30; 
        canvas.width = Math.floor((window.innerWidth * 0.8) / gridSize) * gridSize;
        canvas.height = Math.floor((window.innerHeight * 0.7) / gridSize) * gridSize;

        let score = 0;
        let snake = [{x: 10 * gridSize, y: 10 * gridSize}];
        let food = {x: 0, y: 0};
        let dx = gridSize;
        let dy = 0;
        let nextDx = gridSize;
        let nextDy = 0;
        let gameInterval;

        const foodList = [
            { name: "Carota", icon: "🥕" },
            { name: "Broccolo", icon: "🥦" },
            { name: "Melanzana", icon: "🍆" },
            { name: "Bistecca", icon: "🥩" },
            { name: "Pollo", icon: "🍗" },
            { name: "Salsiccia", icon: "🌭" },
            { name: "Baguette", icon: "🥖" },
            { name: "Pasta", icon: "🍝" },
            { name: "Torta Choco-Vanilla", icon: "🍰" }
        ];
        let currentFoodIndex = 0;

        function init() {
            homeScreen.style.opacity = "0";
            setTimeout(() => {
                homeScreen.style.display = "none";
                createFood();
                gameInterval = setInterval(gameLoop, 120); // Velocità più lenta e fluida
            }, 500);
        }

        function createFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            targetEl.innerText = foodList[currentFoodIndex].name;
        }

        function gameLoop() {
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Collisioni muri
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || collision(head)) {
                alert("Missione Fallita! Punteggio: " + score);
                location.reload();
                return;
            }

            snake.unshift(head);

            // Mangia
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                currentFoodIndex = (currentFoodIndex + 1) % foodList.length;
                createFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function collision(head) {
            return snake.some((seg, index) => index !== 0 && seg.x === head.x && seg.y === head.y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Disegna Cibo (Icone realistiche)
            ctx.font = `${gridSize * 0.8}px serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(foodList[currentFoodIndex].icon, food.x + gridSize/2, food.y + gridSize/2);

            // Disegna Serpente
            snake.forEach((part, i) => {
                const isHead = i === 0;
                
                // Gradiente per il corpo
                ctx.fillStyle = isHead ? "#d400ff" : "#8a00ab";
                ctx.beginPath();
                ctx.roundRect(part.x + 2, part.y + 2, gridSize - 4, gridSize - 4, 8);
                ctx.fill();

                if (isHead) {
                    // Occhi Rossi Socchiusi
                    ctx.fillStyle = "red";
                    // Occhio sinistro
                    ctx.fillRect(part.x + 6, part.y + 8, 8, 3);
                    // Occhio destro
                    ctx.fillRect(part.x + 18, part.y + 8, 8, 3);
                    
                    // Pupilla sottile nera (per l'effetto "socchiuso")
                    ctx.fillStyle = "black";
                    ctx.fillRect(part.x + 6, part.y + 9, 8, 1);
                    ctx.fillRect(part.x + 18, part.y + 9, 8, 1);
                }
            });
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -gridSize; }
            if (e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = gridSize; }
            if (e.key === "ArrowLeft" && dx === 0) { nextDx = -gridSize; nextDy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { nextDx = gridSize; nextDy = 0; }
        });

        startBtn.addEventListener("click", init);

    </script>
</body>
</html>
