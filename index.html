<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANET HER: DIVINE FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff00ff;
            --purple: #7a00ff;
            --gold: #f0c3ff;
            --bg: #05000a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* SFONDO DINAMICO */
        #cosmic-bg { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%); }
        .nebula { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: pulse 10s infinite alternate; }

        @keyframes pulse { from { transform: scale(1); opacity: 0.2; } to { transform: scale(1.5); opacity: 0.4; } }

        /* UI DIVINA */
        .glass-ui {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(240, 195, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 100;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 4rem; letter-spacing: 15px; color: var(--gold); text-shadow: 0 0 30px var(--pink); margin-bottom: 30px; }

        .btn-divine {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 50px;
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            border-radius: 50px;
            transition: 0.5s;
            overflow: hidden;
            position: relative;
        }

        .btn-divine:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 40px var(--gold); transform: translateY(-5px); }

        /* GIOCO */
        #game-container { position: relative; display: none; }
        canvas { display: block; filter: drop-shadow(0 0 10px var(--purple)); }
        
        #hud {
            position: absolute; top: -50px; width: 100%; display: flex; justify-content: space-between;
            font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 2px;
        }

        /* RISULTATI */
        .result-gif { width: 280px; border-radius: 20px; margin: 20px 0; border: 1px solid var(--pink); box-shadow: 0 0 30px var(--pink); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="cosmic-bg"></div>

    <div id="start-menu" class="glass-ui">
        <h1>PLANET HER</h1>
        <p style="margin-bottom: 40px; opacity: 0.7; letter-spacing: 5px;">ASCEND TO DIVINITY</p>
        <button class="btn-divine" onclick="startGame()">START FLOW</button>
    </div>

    <div id="result-menu" class="glass-ui hidden">
        <h2 id="res-title" style="font-family:'Cinzel'; font-size: 2.5rem;"></h2>
        <img id="res-gif" class="result-gif" src="" alt="">
        <p id="res-stats" style="margin-bottom: 30px;"></p>
        <button class="btn-divine" onclick="restartGame()">REBORN</button>
    </div>

    <div id="game-container">
        <div id="hud">
            <span>ENERGY: <span id="score">0</span></span>
            <span>FLOW: <span id="level">1</span></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 30; // Più piccolo per fluidità
        
        let snake = [];
        let particles = [];
        let food = { x: 0, y: 0, type: 'star' };
        let portal = { x: -100, y: -100, active: false };
        let dx = gridSize, dy = 0;
        let nextDx = gridSize, nextDy = 0;
        let score = 0;
        let level = 1;
        let gameLoop;
        let frameCounter = 0;

        // Palette Planet Her
        const colors = ['#ff00ff', '#e0aaff', '#9d4edd', '#7b2cbf', '#5a189a'];

        function init() {
            canvas.width = Math.floor(window.innerWidth * 0.8 / gridSize) * gridSize;
            canvas.height = Math.floor(window.innerHeight * 0.7 / gridSize) * gridSize;
            snake = [
                {x: gridSize * 5, y: gridSize * 5},
                {x: gridSize * 4, y: gridSize * 5},
                {x: gridSize * 3, y: gridSize * 5}
            ];
            spawnFood();
            createNebula();
        }

        function createNebula() {
            const bg = document.getElementById('cosmic-bg');
            for(let i=0; i<5; i++) {
                const n = document.createElement('div');
                n.className = 'nebula';
                n.style.width = Math.random() * 400 + 200 + 'px';
                n.style.height = n.style.width;
                n.style.left = Math.random() * 100 + '%';
                n.style.top = Math.random() * 100 + '%';
                n.style.background = colors[Math.floor(Math.random()*colors.length)];
                bg.appendChild(n);
            }
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            // Ogni tanto spawna un portale
            if(Math.random() > 0.7) {
                portal.active = true;
                portal.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
                portal.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCounter++;

            // Disegna Portale (Pianeta Orbitante)
            if(portal.active) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = "cyan";
                ctx.fillStyle = "rgba(0, 255, 255, 0.3)";
                ctx.beginPath();
                ctx.arc(portal.x + gridSize/2, portal.y + gridSize/2, (gridSize/2) * Math.sin(frameCounter*0.1) + 10, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Disegna Polvere di Stelle (Food)
            ctx.shadowBlur = 15;
            ctx.shadowColor = varColor('--pink');
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(food.x + gridSize/2, food.y + gridSize/2, 5 + Math.sin(frameCounter*0.2)*2, 0, Math.PI*2);
            ctx.fill();

            // Disegna Snake Vivente
            snake.forEach((part, i) => {
                const isHead = i === 0;
                const size = isHead ? gridSize * 0.5 : (gridSize * 0.4) - (i * 0.05);
                const color = colors[i % colors.length];
                
                ctx.shadowBlur = isHead ? 20 : 10;
                ctx.shadowColor = color;
                ctx.fillStyle = color;

                ctx.beginPath();
                // Effetto fluido: posizione leggermente oscillante
                const wobble = Math.sin(frameCounter * 0.1 + i) * 2;
                ctx.arc(part.x + gridSize/2 + wobble, part.y + gridSize/2 + wobble, Math.max(size, 2), 0, Math.PI*2);
                ctx.fill();
                
                // Aura divina sulla testa
                if(isHead) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
        }

        function update() {
            dx = nextDx; dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Collisione Portale
            if(portal.active && head.x === portal.x && head.y === portal.y) {
                head.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
                head.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
                portal.active = false;
            }

            // Game Over
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame(false);
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                if(score % 100 === 0) { level++; document.getElementById('level').innerText = level; }
                if(score >= 150) { endGame(true); return; }
                spawnFood();
            } else {
                snake.pop();
            }
            draw();
        }

        function varColor(name) { return getComputedStyle(document.body).getPropertyValue(name).trim(); }

        function startGame() {
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('game-container').style.display = 'block';
            init();
            gameLoop = setInterval(update, 120);
        }

        function endGame(win) {
            clearInterval(gameLoop);
            document.getElementById('game-container').style.display = 'none';
            const menu = document.getElementById('result-menu');
            menu.classList.remove('hidden');
            
            document.getElementById('res-title').innerText = win ? "DIVINITY REACHED" : "ENERGY DEPLETED";
            document.getElementById('res-gif').src = win ? 
                "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExaDg2ZXYweWN3a2dmdmR5MTUwbXg4MmJsc2hiNzFvbzM0OWtrdmZibiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tODygE8KCqBzy/giphy.gif" : 
                "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ6eHh6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Jm09Z1/3o7TKVUn7iM8FMEU24/giphy.gif";
            document.getElementById('res-stats').innerText = `Final Energy: ${score} | Flow Level: ${level}`;
        }

        function restartGame() {
            score = 0; level = 1;
            document.getElementById('score').innerText = "0";
            document.getElementById('level').innerText = "1";
            document.getElementById('result-menu').classList.add('hidden');
            startGame();
        }

        // CONTROLLI
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy === 0) { nextDx = 0; nextDy = -gridSize; }
            if (e.key === 'ArrowDown' && dy === 0) { nextDx = 0; nextDy = gridSize; }
            if (e.key === 'ArrowLeft' && dx === 0) { nextDx = -gridSize; nextDy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { nextDx = gridSize; nextDy = 0; }
        });
    </script>
</body>
</html>
