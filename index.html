<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANET HER: DIVINE ASCENSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05000a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* UNIVERSO DETTAGLIATO */
        #universe {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #2d004d 0%, #05000a 100%);
            overflow: hidden;
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; box-shadow: 0 0 5px white; }
        .planet {
            position: absolute; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,0,255,0.3), rgba(122,0,255,0.3));
            box-shadow: inset -20px -20px 60px rgba(0,0,0,0.8), 0 0 50px rgba(255, 0, 255, 0.4);
            filter: blur(1px);
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float { from { transform: translate(0,0); } to { transform: translate(30px, 30px); } }

        /* IPERSPAZIO FRONTALE */
        #warp-canvas { position: absolute; inset: 0; z-index: 200; display: none; background: black; }

        /* UI DIVINA E ORGANICA */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(5, 0, 10, 0.8);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; backdrop-filter: blur(15px);
        }

        h1 { 
            font-family: 'Cinzel', serif; font-size: clamp(3rem, 10vw, 6rem); 
            color: #f0c3ff; text-shadow: 0 0 40px rgba(240, 195, 255, 0.6);
            letter-spacing: 15px; margin-bottom: 20px;
        }

        .btn-space {
            padding: 20px 60px; font-family: 'Cinzel', serif; font-size: 1.2rem;
            background: transparent; color: #f0c3ff; border: 1px solid #f0c3ff;
            cursor: pointer; letter-spacing: 5px; border-radius: 50px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-space:hover { background: #f0c3ff; color: #050010; box-shadow: 0 0 40px #f0c3ff; transform: scale(1.05); }

        /* GIOCO */
        #game-wrapper { position: relative; padding: 20px; border: 1px solid rgba(240, 195, 255, 0.2); border-radius: 30px; background: rgba(255, 255, 255, 0.02); }
        canvas#gameCanvas { display: block; border-radius: 20px; }
        
        #ui-layer { 
            position: absolute; top: -60px; width: 100%; display: flex; 
            justify-content: space-between; font-family: 'Cinzel', serif; color: #f0c3ff;
        }

        .result-gif { width: 300px; border-radius: 20px; margin: 20px 0; border: 1px solid #ff00ff; box-shadow: 0 0 20px #ff00ff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="universe"></div>
    <canvas id="warp-canvas"></canvas>

    <div id="home-screen" class="overlay">
        <h1>PLANET HER</h1>
        <p style="letter-spacing: 8px; color: #ccc; margin-bottom: 40px;">DIVINE SERPENT FLOW</p>
        <button class="btn-space" onclick="startWarp()">ENTER DIMENSION</button>
    </div>

    <div id="result-screen" class="overlay hidden">
        <h2 id="result-title" style="font-family:'Cinzel'; font-size: 3rem; margin-bottom: 10px;"></h2>
        <img id="result-gif" class="result-gif" src="" alt="result">
        <div id="result-stats" style="font-size: 1.3rem; color: #f0c3ff; margin-bottom: 25px; text-align: center;"></div>
        <button id="result-btn" class="btn-space"></button>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="ui-layer">
            <span>ENERGY: <span id="score">0</span></span>
            <span>LEVEL: <span id="lvl">1</span></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const warpCanvas = document.getElementById("warp-canvas");
        const warpCtx = warpCanvas.getContext("2d");
        const gridSize = 45;

        let level = 1; let score = 0; let foodsEaten = 0;
        let snake = []; let food = {x: 0, y: 0, data: null};
        let portal = {x: -100, y: -100, active: false};
        let dx = gridSize, dy = 0, nextDx = gridSize, nextDy = 0;
        let gameInterval; let frame = 0;

        const palette = ["#ff00ff", "#e0aaff", "#9d4edd", "#7b2cbf", "#5a189a", "#ff77ff", "#c77dff"];
        const foodList = [
            { icon: "🥕", name: "Carota" }, { icon: "🥩", name: "Bistecca" }, { icon: "🍰", name: "Torta" },
            { icon: "🍕", name: "Pizza" }, { icon: "🍩", name: "Donut" }, { icon: "🍗", name: "Pollo" }
        ];

        // --- CREAZIONE UNIVERSO ---
        function buildUniverse() {
            const container = document.getElementById('universe');
            for(let i=0; i<150; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3;
                s.style.width = size + 'px'; s.style.height = size + 'px';
                s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
                container.appendChild(s);
            }
            for(let i=0; i<4; i++) {
                const p = document.createElement('div');
                p.className = 'planet';
                const size = 100 + Math.random() * 200;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = (Math.random() * 80) + '%'; p.style.top = (Math.random() * 70) + '%';
                container.appendChild(p);
            }
        }
        buildUniverse();

        // --- IPERSPAZIO FRONTALE ---
        function startWarp() {
            document.getElementById('home-screen').style.opacity = '0';
            warpCanvas.style.display = 'block';
            warpCanvas.width = window.innerWidth;
            warpCanvas.height = window.innerHeight;
            let stars = [];
            for(let i=0; i<500; i++) stars.push({
                x: Math.random() * warpCanvas.width - warpCanvas.width/2,
                y: Math.random() * warpCanvas.height - warpCanvas.height/2,
                z: Math.random() * warpCanvas.width
            });

            function animateWarp() {
                warpCtx.fillStyle = "rgba(0,0,0,0.2)";
                warpCtx.fillRect(0, 0, warpCanvas.width, warpCanvas.height);
                let done = true;
                stars.forEach(s => {
                    s.z -= 20;
                    if(s.z <= 0) s.z = warpCanvas.width;
                    let sx = (s.x / s.z) * 150 + warpCanvas.width/2;
                    let sy = (s.y / s.z) * 150 + warpCanvas.height/2;
                    let size = (1 - s.z / warpCanvas.width) * 5;
                    warpCtx.fillStyle = "#f0c3ff";
                    warpCtx.beginPath(); warpCtx.arc(sx, sy, size, 0, Math.PI*2); warpCtx.fill();
                    if(frame < 100) done = false;
                });
                frame++;
                if(frame < 120) requestAnimationFrame(animateWarp);
                else {
                    warpCanvas.style.display = 'none';
                    document.getElementById('game-wrapper').classList.remove('hidden');
                    initGame();
                }
            }
            animateWarp();
        }

        function initGame() {
            canvas.width = Math.floor((window.innerWidth * 0.8) / gridSize) * gridSize;
            canvas.height = Math.floor((window.innerHeight * 0.65) / gridSize) * gridSize;
            snake = [
                {x: 4 * gridSize, y: 5 * gridSize, color: palette[0]},
                {x: 3 * gridSize, y: 5 * gridSize, color: palette[1]},
                {x: 2 * gridSize, y: 5 * gridSize, color: palette[2]}
            ];
            dx = gridSize; dy = 0; nextDx = gridSize; nextDy = 0;
            score = 0; foodsEaten = 0;
            spawnFood();
            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 180);
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            food.data = foodList[Math.floor(Math.random() * foodList.length)];
            // Spawna portale ogni tanto
            if(Math.random() > 0.8) {
                portal.active = true;
                portal.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
                portal.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            }
        }

        function gameLoop() {
            frame++;
            dx = nextDx; dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy, color: palette[frame % palette.length] };

            // Collisione Portale (Teletrasporto)
            if(portal.active && head.x === portal.x && head.y === portal.y) {
                head.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
                head.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
                portal.active = false;
            }

            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                showResult(false); return;
            }

            if (head.x === food.x && head.y === food.y) {
                score += 15; foodsEaten++;
                snake.unshift(head);
                if (foodsEaten >= 10) showResult(true); else spawnFood();
            } else {
                for(let i = snake.length - 1; i > 0; i--) {
                    snake[i].x = snake[i-1].x; snake[i].y = snake[i-1].y;
                    snake[i].color = snake[i-1].color;
                }
                snake[0].x = head.x; snake[0].y = head.y; snake[0].color = head.color;
            }
            document.getElementById('score').innerText = score;
            document.getElementById('lvl').innerText = level;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Disegna Portale
            if(portal.active) {
                ctx.shadowBlur = 25; ctx.shadowColor = "#00ffff";
                ctx.fillStyle = "rgba(0, 255, 255, 0.4)";
                ctx.beginPath();
                ctx.arc(portal.x + gridSize/2, portal.y + gridSize/2, gridSize/2 * Math.sin(frame*0.2) + 15, 0, Math.PI*2);
                ctx.fill();
            }

            // Disegna Cibo Realistico
            ctx.shadowBlur = 10; ctx.shadowColor = "white";
            ctx.font = "35px serif"; ctx.textAlign = "center";
            ctx.fillText(food.data.icon, food.x + gridSize/2, food.y + gridSize/2 + 12);

            // Disegna Snake Divino (Sfere e Scia)
            snake.forEach((part, i) => {
                ctx.shadowBlur = 20; ctx.shadowColor = part.color;
                ctx.fillStyle = part.color;
                const size = i === 0 ? 20 : 18 - (i * 0.2);
                const wobble = Math.sin(frame * 0.2 + i) * 3;
                
                ctx.beginPath();
                ctx.arc(part.x + gridSize/2 + wobble, part.y + gridSize/2 + wobble, Math.max(size, 5), 0, Math.PI*2);
                ctx.fill();
                
                // Glitter effect
                if(Math.random() > 0.8) {
                    ctx.fillStyle = "white";
                    ctx.fillRect(part.x + Math.random()*gridSize, part.y + Math.random()*gridSize, 2, 2);
                }
            });
        }

        function showResult(isWin) {
            clearInterval(gameInterval);
            const screen = document.getElementById('result-screen');
            const gif = document.getElementById('result-gif');
            const title = document.getElementById('result-title');
            const btn = document.getElementById('result-btn');

            screen.classList.remove('hidden');
            if(isWin) {
                title.innerText = "ASCENDED"; title.style.color = "#f0c3ff";
                gif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExaDg2ZXYweWN3a2dmdmR5MTUwbXg4MmJsc2hiNzFvbzM0OWtrdmZibiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tODygE8KCqBzy/giphy.gif";
                btn.innerText = "NEXT FLOW";
                btn.onclick = () => { level++; screen.classList.add('hidden'); initGame(); };
            } else {
                title.innerText = "DEFEAT"; title.style.color = "#ff4444";
                gif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ6eHh6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Jm09Z1/3o7TKVUn7iM8FMEU24/giphy.gif";
                btn.innerText = "REBORN";
                btn.onclick = () => { screen.classList.add('hidden'); initGame(); };
            }
            document.getElementById('result-stats').innerHTML = `ENERGY: ${score}<br>DIMENSION: ${level}`;
        }

        // CONTROLLI
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -gridSize; }
            if (e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = gridSize; }
            if (e.key === "ArrowLeft" && dx === 0) { nextDx = -gridSize; nextDy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { nextDx = gridSize; nextDy = 0; }
        });
    </script>
</body>
</html>
