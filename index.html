<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Space Invaders Bob Marley Edition</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
    }
    canvas {
        display: block;
        margin: auto;
        background: radial-gradient(#000010, #000);
    }
    #score {
        position: absolute;
        top: 10px;
        left: 20px;
        font-size: 24px;
        z-index: 10;
        text-shadow: 0 0 10px #00ff00;
    }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="gameCanvas"></canvas>

<script>
// ====================== SETUP ======================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 600;

let score = 0;
document.getElementById("score").innerText = "Score: " + score;

// ====================== PLAYER (Bob Marley dalla cartella assets) ======================
const playerImg = new Image();
playerImg.src = "assets/BOBBEMALLE.PNG";   // ← Carica dalla cartella assets

const player = {
    x: canvas.width / 2 - 32,
    y: canvas.height - 80,
    width: 64,
    height: 64,
    speed: 7
};

// ====================== BULLETS (canne) ======================
let bullets = [];

// ====================== ENEMIES (cibi emoji) ======================
let enemies = [];
const foods = ["🍔", "🍕", "🌮", "🍣", "🍦", "🍟", "🌭", "🍝", "🥗", "🍰", "🍩", "🥪"];

function createEnemies() {
    enemies = [];
    for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 10; col++) {
            enemies.push({
                x: 55 + col * 65,
                y: 40 + row * 55,
                width: 50,
                height: 50,
                alive: true,
                emoji: foods[Math.floor(Math.random() * foods.length)]
            });
        }
    }
}

// ====================== DRAW ======================
function drawPlayer() {
    if (playerImg.complete) {
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
    } else {
        // fallback
        ctx.fillStyle = "#00ff88";
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }
}

function drawBullets() {
    ctx.font = "22px Arial";
    bullets.forEach((b, i) => {
        b.y -= 9;
        ctx.fillText("🌿", b.x - 10, b.y + 18);
        if (b.y < 0) bullets.splice(i, 1);
    });
}

function drawEnemies() {
    ctx.font = "42px Arial";
    let hitEdge = false;

    enemies.forEach(enemy => {
        if (!enemy.alive) return;

        enemy.x += enemyDirection * 0.9;

        if (enemy.x + enemy.width > canvas.width - 20 || enemy.x < 10) {
            hitEdge = true;
        }

        ctx.fillText(enemy.emoji, enemy.x, enemy.y + 42);
    });

    if (hitEdge) {
        enemyDirection *= -1;
        enemies.forEach(e => e.y += 28);
    }
}

// ====================== CONTROLS ======================
let keys = {};
let enemyDirection = 1;

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

function shoot() {
    bullets.push({
        x: player.x + player.width / 2 - 10,
        y: player.y + 15
    });
}

// ====================== COLLISIONS ======================
function detectCollisions() {
    bullets.forEach((b, bi) => {
        for (let i = enemies.length - 1; i >= 0; i--) {
            const enemy = enemies[i];
            if (!enemy.alive) continue;

            if (
                b.x < enemy.x + enemy.width &&
                b.x + 20 > enemy.x &&
                b.y < enemy.y + enemy.height &&
                b.y + 25 > enemy.y
            ) {
                enemy.alive = false;
                bullets.splice(bi, 1);
                score += 20;
                document.getElementById("score").innerText = "Score: " + score;
                break;
            }
        }
    });
}

// ====================== GAME LOOP ======================
function update() {
    if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

    if (keys["Space"]) {
        if (!keys["SpacePressed"]) {
            shoot();
            keys["SpacePressed"] = true;
        }
    } else {
        keys["SpacePressed"] = false;
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    update();
    drawPlayer();
    drawBullets();
    drawEnemies();
    detectCollisions();

    requestAnimationFrame(gameLoop);
}

// ====================== START ======================
playerImg.onload = () => {
    createEnemies();
    gameLoop();
};

playerImg.onerror = () => {
    alert("❌ Immagine non trovata!\n\nAssicurati che il file sia in:\n/assets/BOBBEMALLE.PNG");
    createEnemies();
    gameLoop();
};
</script>
</body>
</html>
