<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE: PLANET HER - FINAL PERFECT EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #05000a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Playfair Display', serif; }
        
        /* SFONDO CON PIANETI E STELLE */
        #universe { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at center, #2d004d 0%, #05000a 100%); overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; filter: blur(1px); }
        .planet { 
            position: absolute; border-radius: 50%; 
            background: linear-gradient(135deg, rgba(255,0,255,0.3), rgba(122,0,255,0.1)); 
            box-shadow: inset -20px -20px 60px rgba(0,0,0,0.8), 0 0 60px rgba(255, 0, 255, 0.2); 
            filter: blur(1px); animation: float 40s infinite alternate ease-in-out;
        }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(40px, 40px); } }

        #warp-canvas { position: absolute; inset: 0; z-index: 200; display: none; background: black; }
        .overlay { position: absolute; inset: 0; background: rgba(5, 0, 10, 0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(15px); }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(3rem, 12vw, 7rem); color: #f0c3ff; text-shadow: 0 0 40px rgba(240, 195, 255, 0.5); letter-spacing: 20px; margin-bottom: 20px; }
        button { padding: 20px 70px; font-family: 'Cinzel', serif; font-size: 1.3rem; background: transparent; color: #f0c3ff; border: 1px solid #f0c3ff; cursor: pointer; letter-spacing: 5px; transition: 0.5s; border-radius: 50px; }
        button:hover { background: #f0c3ff; color: #050010; box-shadow: 0 0 50px rgba(240, 195, 255, 0.6); }
        
        #game-wrapper { position: relative; padding: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(240, 195, 255, 0.1); border-radius: 20px; }
        canvas#gameCanvas { display: block; background: transparent; }
        #ui-layer { position: absolute; top: -60px; width: 100%; display: flex; justify-content: space-between; font-family: 'Cinzel', serif; color: #f0c3ff; font-size: 1.2rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="universe"></div>
    <canvas id="warp-canvas"></canvas>

    <!-- SCHERMATA HOME -->
    <div id="home-screen" class="overlay">
        <h1>PLANET HER</h1>
        <p style="letter-spacing: 10px; opacity: 0.6; margin-bottom: 50px;">A ROYALE SPACE JOURNEY</p>
        <button id="start-btn" onclick="activateSystems()">ACTIVATE SYSTEMS</button>
    </div>

    <!-- SCHERMATA RISULTATI -->
    <div id="result-screen" class="overlay hidden">
        <h2 id="result-title" style="font-family:'Cinzel'; font-size: 4rem; margin-bottom: 20px;"></h2>
        <div id="result-stats" style="font-size: 1.8rem; color: #ccc; margin-bottom: 30px; text-align: center;"></div>
        <button id="result-btn"></button>
    </div>

    <!-- WRAPPER GIOCO -->
    <div id="game-wrapper" class="hidden">
        <div id="ui-layer">
            <span>LVL: <span id="lvl">1</span></span>
            <span>FOOD: <span id="f-count">0</span>/10</span>
            <span>SCORE: <span id="score">0</span></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- APPARATO AUDIO COMPLETO ---
        const sounds = {
            inizio: new Audio('assets/inizio.wav'),
            transition: new Audio('assets/transition.wav'),
            durante: new Audio('assets/durante.wav'),
            magnare: 'assets/magnare.wav',
            livellopassato: new Audio('assets/livellopassato.wav'),
            lose: new Audio('assets/lose.wav')
        };

        function stopAllMusic() {
            Object.values(sounds).forEach(s => {
                if (s instanceof Audio) {
                    s.pause();
                    s.currentTime = 0;
                }
            });
        }

        // 1. Schermata iniziale: parte inizio.wav al click di sblocco
        function activateSystems() {
            stopAllMusic();
            sounds.inizio.loop = true;
            sounds.inizio.play().catch(e => console.log("Audio attivato"));
            
            const btn = document.getElementById('start-btn');
            btn.innerText = "START MISSION";
            btn.onclick = startWarpSequence;
        }

        // 2. Transizione ordita: stoppa inizio.wav, parte transition.wav
        function startWarpSequence() {
            stopAllMusic(); 
            sounds.transition.play(); 
            
            document.getElementById('home-screen').classList.add('hidden');
            
            const wc = document.getElementById('warp-canvas');
            wc.style.display = 'block';
            wc.width = window.innerWidth; wc.height = window.innerHeight;
            
            let stars = [];
            for(let i=0; i<400; i++) {
                stars.push({
                    x: Math.random() * wc.width - wc.width/2,
                    y: Math.random() * wc.height - wc.height/2,
                    z: Math.random() * wc.width
                });
            }

            // Transizione prolungata per coprire la durata del file transition.wav
            function anim() {
                warpCtx.fillStyle = "rgba(0,0,0,0.03)";
                warpCtx.fillRect(0, 0, wc.width, wc.height);
                let done = true;
                
                stars.forEach(s => {
                    s.z -= 6; // Rallentato costantemente per dare il tempo alla traccia di suonare
                    if(s.z <= 0) s.z = 0; else done = false;
                    
                    let sx = (s.x / s.z) * 100 + wc.width/2;
                    let sy = (s.y / s.z) * 100 + wc.height/2;
                    warpCtx.fillStyle = "#f0c3ff";
                    warpCtx.beginPath(); warpCtx.arc(sx, sy, 1.5, 0, Math.PI*2); warpCtx.fill();
                });

                if(!done) {
                    requestAnimationFrame(anim);
                } else {
                    // Fine del Warp: spegne transition.wav ed avvia direttamente durante.wav in gioco
                    wc.style.display = 'none';
                    document.getElementById('game-wrapper').classList.remove('hidden');
                    stopAllMusic(); 
                    
                    sounds.durante.loop = true;
                    sounds.durante.play();
                    initGame();
                }
            }
            anim();
        }

        // --- ENGINE DI GIOCO ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const warpCtx = document.getElementById("warp-canvas").getContext("2d");
        const gridSize = 45;
        let level = 1, score = 0, foodsInLevel = 0, snake = [], food = {x:0, y:0, data:null}, dx, dy, nextDx, nextDy, gameInterval;
        const palette = ["#ff00ff", "#e0aaff", "#9d4edd", "#7b2cbf", "#5a189a"];
        const foodList = [{icon:"🥩"}, {icon:"🍰"}, {icon:"🍗"}, {icon:"🍕"}, {icon:"🥦"}, {icon:"🥕"}];

        function initGame() {
            canvas.width = Math.floor((window.innerWidth * 0.8)/gridSize)*gridSize;
            canvas.height = Math.floor((window.innerHeight * 0.65)/gridSize)*gridSize;
            snake = [{x: 5*gridSize, y: 5*gridSize, color: palette[0]}, {x: 4*gridSize, y: 5*gridSize, color: palette[1]}];
            dx = gridSize; dy = 0; nextDx = gridSize; nextDy = 0;
            foodsInLevel = 0;
            spawnFood();
            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 180 - (Math.min(level * 5, 100)));
        }

        function spawnFood() {
            food.x = Math.floor(Math.random()*(canvas.width/gridSize))*gridSize;
            food.y = Math.floor(Math.random()*(canvas.height/gridSize))*gridSize;
            food.data = foodList[Math.floor(Math.random()*foodList.length)];
        }

        function gameLoop() {
            dx = nextDx; dy = nextDy;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy, color: snake[0].color};

            // CONTROLLO IMPATTO (PERDITA)
            if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                showResult(false); return;
            }

            // CONTROLLO MANGIATA
            if(head.x === food.x && head.y === food.y) {
                new Audio(sounds.magnare).play(); // Suona magnare.wav istantaneamente al contatto
                score += 10; foodsInLevel++;
                snake.unshift({x: head.x, y: head.y, color: palette[snake.length % palette.length]});
                
                if(foodsInLevel >= 10) { 
                    showResult(true); 
                } else { 
                    spawnFood(); 
                }
            } else {
                for(let i=snake.length-1; i>0; i--) { snake[i].x = snake[i-1].x; snake[i].y = snake[i-1].y; }
                snake[0].x = head.x; snake[0].y = head.y;
            }
            updateUI(); draw();
        }

        function showResult(isWin) {
            clearInterval(gameInterval);
            stopAllMusic(); // Stoppa durante.wav
            
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const stats = document.getElementById('result-stats');
            const btn = document.getElementById('result-btn');

            screen.classList.remove('hidden');
            
            if(isWin) {
                // RIPRODUZIONE VITTORIA (Suona ad oltranza finché non si preme il tasto)
                sounds.livellopassato.loop = true;
                sounds.livellopassato.play().catch(e => console.log("Errore riproduzione vittoria"));
                
                title.innerText = "LEVEL ASCENDED";
                title.style.color = "#f0c3ff";
                title.style.textShadow = "0 0 30px #f0c3ff";
                stats.innerHTML = `ENERGY HARVESTED: ${score}<br>DIMENSION: ${level}`;
                btn.innerText = "NEXT DIMENSION";
            } else {
                // RIPRODUZIONE SCONFITTA (Suona ad oltranza finché non si preme il tasto)
                sounds.lose.loop = true;
                sounds.lose.play().catch(e => console.log("Errore riproduzione lose"));
                
                title.innerText = "COSMIC DEFEAT";
                title.style.color = "#ff4444";
                title.style.textShadow = "0 0 30px #ff4444";
                stats.innerHTML = `FINAL ENERGY: ${score}<br>REACHED LEVEL: ${level}`;
                btn.innerText = "REBORN";
            }

            // LA MUSICA SI STOPPA SOLO E SOLTANTO QUANDO SI PREME IL TASTO PER PROCEDERE
            btn.onclick = () => {
                if(isWin) level++;
                screen.classList.add('hidden');
                
                stopAllMusic(); // STOP COMPLETO dell'audio di fine schermata al click del tasto procedi
                
                sounds.durante.loop = true;
                sounds.durante.play(); // Rilancia durante.wav per la nuova partita
                initGame();
            };
        }

        function updateUI() {
            document.getElementById('lvl').innerText = level;
            document.getElementById('f-count').innerText = foodsInLevel;
            document.getElementById('score').innerText = score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Cibo
            ctx.font = "35px serif"; ctx.textAlign = "center";
            ctx.fillText(food.data.icon, food.x + gridSize/2, food.y + gridSize/2 + 12);
            
            // Serpente Fluido con ripristino OCCHI ROSSI sulla testa
            snake.forEach((part, i) => {
                ctx.fillStyle = part.color;
                ctx.shadowBlur = i === 0 ? 20 : 10;
                ctx.shadowColor = part.color;
                ctx.beginPath();
                ctx.arc(part.x + gridSize/2, part.y + gridSize/2, (gridSize/2)-4, 0, Math.PI*2);
                ctx.fill();

                // COSTRUZIONE DEGLI OCCHI ROSSI SULLA TESTA (Indice i === 0)
                if(i === 0) {
                    ctx.fillStyle = "#ff0000";
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "#ff0000";
                    
                    let headX = part.x + gridSize/2;
                    let headY = part.y + gridSize/2;

                    // Posiziona gli occhi a seconda della direzione corrente del movimento
                    if (dx > 0) { // Destra
                        ctx.fillRect(headX + 5, headY - 8, 4, 4);
                        ctx.fillRect(headX + 5, headY + 4, 4, 4);
                    } else if (dx < 0) { // Sinistra
                        ctx.fillRect(headX - 9, headY - 8, 4, 4);
                        ctx.fillRect(headX - 9, headY + 4, 4, 4);
                    } else if (dy < 0) { // Su
                        ctx.fillRect(headX - 8, headY - 9, 4, 4);
                        ctx.fillRect(headX + 4, headY - 9, 4, 4);
                    } else if (dy > 0) { // Giù
                        ctx.fillRect(headX - 8, headY + 5, 4, 4);
                        ctx.fillRect(headX + 4, headY + 5, 4, 4);
                    }
                }
            });
            ctx.shadowBlur = 0;
        }

        // --- GEOMETRIA DELL'UNIVERSO ---
        function buildUniverse() {
            const container = document.getElementById('universe');
            for(let i=0; i<150; i++) {
                const s = document.createElement('div'); s.className = 'star';
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
                container.appendChild(s);
            }
            const colors = ['rgba(255,0,255,0.2)', 'rgba(150,0,255,0.2)', 'rgba(0,200,255,0.1)'];
            for(let i=0; i<5; i++) {
                const p = document.createElement('div'); p.className = 'planet';
                const size = 200 + Math.random()*300;
                p.style.width = p.style.height = size+'px';
                p.style.left = Math.random()*90+'%'; p.style.top = Math.random()*90+'%';
                p.style.background = `linear-gradient(135deg, ${colors[i%3]}, transparent)`;
                container.appendChild(p);
            }
        }
        buildUniverse();

        window.addEventListener("keydown", e => {
            if(e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -gridSize; }
            if(e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = gridSize; }
            if(e.key === "ArrowLeft" && dx === 0) { nextDx = -gridSize; nextDy = 0; }
            if(e.key === "ArrowRight" && dx === 0) { nextDx = gridSize; nextDy = 0; }
        });
    </script>
</body>
</html>
