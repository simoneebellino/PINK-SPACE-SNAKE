<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE: PLANET HER - ROYALE EDITION</title>
    <!-- Importiamo un font elegante da Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #2d004d 0%, #05000a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            color: #f8f8f8;
        }

        #space-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff00ff55, #7a00ff55);
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255, 0, 255, 0.2);
            z-index: -1;
        }

        /* Schermate Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 0, 10, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        h1 { 
            font-family: 'Cinzel', serif;
            font-size: 6rem; 
            color: #e0aaff; 
            text-shadow: 0 0 30px rgba(224, 170, 255, 0.6);
            margin-bottom: 10px;
            letter-spacing: 15px;
        }

        h2 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: #ff00ff; margin-bottom: 20px; }

        .stats { font-size: 1.4rem; margin: 25px 0; color: #d4d4d4; font-style: italic; }
        
        button {
            padding: 18px 60px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            background: transparent;
            color: #e0aaff;
            border: 1px solid #e0aaff;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.4s ease;
        }

        button:hover {
            background: #e0aaff;
            color: #050010;
            box-shadow: 0 0 40px rgba(224, 170, 255, 0.4);
        }

        #game-container { position: relative; border: 1px solid rgba(224, 170, 255, 0.2); }
        canvas { display: block; cursor: crosshair; }

        #ui-top {
            position: absolute; top: -50px; width: 100%;
            display: flex; justify-content: space-between;
            font-family: 'Cinzel', serif; font-size: 1rem; color: #e0aaff;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="space-bg"></div>

    <!-- Schermata Iniziale -->
    <div id="home-screen" class="overlay">
        <h1>PLANET HER</h1>
        <p style="letter-spacing: 5px; opacity: 0.8;">ROYALE SNAKE ODYSSEY</p><br><br>
        <button onclick="startGame()">START MISSION</button>
    </div>

    <!-- Schermata Risultati -->
    <div id="result-screen" class="overlay hidden">
        <h2 id="result-title">LEVEL COMPLETE</h2>
        <div class="stats" id="result-stats"></div>
        <button id="result-btn"></button>
    </div>

    <div id="game-container" class="hidden">
        <div id="ui-top">
            <span>Level: <span id="lvl-val">1</span></span>
            <span>Progress: <span id="food-count">0</span>/10</span>
            <span>Score: <span id="score-val">0</span></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 40; // Griglia più grande
        
        let level = 1;
        let score = 0;
        let foodsEatenInLevel = 0;
        let totalFoodsList = [];
        let snake = [];
        let food = {x: 0, y: 0};
        let dx = gridSize, dy = 0;
        let nextDx = gridSize, nextDy = 0;
        let gameInterval;
        let isMouseDown = false;

        const foodList = [
            { name: "Carota", icon: "🥕" }, { name: "Broccolo", icon: "🥦" }, { name: "Melanzana", icon: "🍆" },
            { name: "Bistecca", icon: "🥩" }, { name: "Pollo", icon: "🍗" }, { name: "Salsiccia", icon: "🌭" },
            { name: "Baguette", icon: "🥖" }, { name: "Pasta", icon: "🍝" }, { name: "Torta", icon: "🍰" }
        ];

        // Creazione Sfondo Spaziale Royale
        function createStars() {
            const bg = document.getElementById('space-bg');
            for(let i=0; i<3; i++) {
                const p = document.createElement('div');
                p.className = 'planet';
                const size = 150 + Math.random() * 250;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = Math.random() * 90 + '%';
                p.style.top = Math.random() * 90 + '%';
                bg.appendChild(p);
            }
        }
        createStars();

        function startGame() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            resetLevel();
        }

        function resetLevel() {
            canvas.width = Math.floor((window.innerWidth * 0.8) / gridSize) * gridSize;
            canvas.height = Math.floor((window.innerHeight * 0.7) / gridSize) * gridSize;
            snake = [{x: 5 * gridSize, y: 5 * gridSize}, {x: 4 * gridSize, y: 5 * gridSize}];
            dx = gridSize; dy = 0; nextDx = gridSize; nextDy = 0;
            foodsEatenInLevel = 0;
            updateUI();
            spawnFood();
            if(gameInterval) clearInterval(gameInterval);
            // Velocità rallentata (200ms è molto calmo e fluido)
            gameInterval = setInterval(gameLoop, 200); 
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            food.data = foodList[Math.floor(Math.random() * foodList.length)];
        }

        function gameLoop() {
            dx = nextDx; dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame(false);
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += (10 * level);
                foodsEatenInLevel++;
                totalFoodsList.push(food.data.icon);
                updateUI();
                if (foodsEatenInLevel >= 10) endGame(true);
                else spawnFood();
            } else {
                snake.pop();
            }
            draw();
        }

        function updateUI() {
            document.getElementById('lvl-val').innerText = level;
            document.getElementById('food-count').innerText = foodsEatenInLevel;
            document.getElementById('score-val').innerText = score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Cibo
            ctx.font = "32px serif";
            ctx.textAlign = "center";
            ctx.fillText(food.data.icon, food.x + gridSize/2, food.y + gridSize/2 + 8);

            // Serpente Realistico/Elegante
            snake.forEach((part, i) => {
                const isHead = i === 0;
                
                // Gradiente per un corpo più realistico
                let gradient = ctx.createRadialGradient(part.x + 20, part.y + 20, 5, part.x + 20, part.y + 20, 20);
                gradient.addColorStop(0, isHead ? "#e0aaff" : "#9d4edd");
                gradient.addColorStop(1, isHead ? "#7b2cbf" : "#3c096c");
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(part.x + 3, part.y + 3, gridSize - 6, gridSize - 6, 12);
                ctx.fill();

                if (isHead) {
                    // Occhi Rossi Socchiusi e minacciosi
                    ctx.fillStyle = "rgba(255, 0, 0, 0.9)";
                    ctx.fillRect(part.x + 8, part.y + 12, 10, 4); // occhio sx
                    ctx.fillRect(part.x + 24, part.y + 12, 10, 4); // occhio dx
                    ctx.fillStyle = "black";
                    ctx.fillRect(part.x + 8, part.y + 13, 10, 1); // fessura pupilla
                    ctx.fillRect(part.x + 24, part.y + 13, 10, 1);
                }
            });
        }

        function endGame(isWin) {
            clearInterval(gameInterval);
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const stats = document.getElementById('result-stats');
            const btn = document.getElementById('result-btn');

            screen.classList.remove('hidden');

            if (isWin) {
                title.innerText = "ASCENSION SUCCESSFUL";
                stats.innerHTML = `Punteggio: ${score}<br>Dieta reale: ${totalFoodsList.slice(-10).join(' ')}`;
                btn.innerText = level < 20 ? "NEXT LEVEL" : "REIGN SUPREME";
                btn.onclick = () => {
                    if(level < 20) { level++; screen.classList.add('hidden'); resetLevel(); }
                    else location.reload();
                };
            } else {
                title.innerText = "MISSION FAILED";
                stats.innerHTML = `Caduto al livello ${level}<br>Punteggio: ${score}`;
                btn.innerText = "TRY AGAIN";
                btn.onclick = () => { screen.classList.add('hidden'); resetLevel(); };
            }
        }

        // Controllo Tastiera
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -gridSize; }
            else if (e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = gridSize; }
            else if (e.key === "ArrowLeft" && dx === 0) { nextDx = -gridSize; nextDy = 0; }
            else if (e.key === "ArrowRight" && dx === 0) { nextDx = gridSize; nextDy = 0; }
        });

        // Controllo Mouse (Hold and Drag)
        canvas.addEventListener("mousemove", e => {
            if (isMouseDown) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const headX = snake[0].x + gridSize/2;
                const headY = snake[0].y + gridSize/2;

                const diffX = mouseX - headX;
                const diffY = mouseY - headY;

                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 20 && dx === 0) { nextDx = gridSize; nextDy = 0; }
                    else if (diffX < -20 && dx === 0) { nextDx = -gridSize; nextDy = 0; }
                } else {
                    if (diffY > 20 && dy === 0) { nextDx = 0; nextDy = gridSize; }
                    else if (diffY < -20 && dy === 0) { nextDx = 0; nextDy = -gridSize; }
                }
            }
        });
        canvas.addEventListener("mousedown", () => isMouseDown = true);
        window.addEventListener("mouseup", () => isMouseDown = false);

    </script>
</body>
</html>
