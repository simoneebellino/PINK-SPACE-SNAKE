<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE: PLANET HER - LIGHTSPEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05000a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            color: #f8f8f8;
        }

        #space-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #2d004d 0%, #05000a 100%);
        }

        /* Effetto Hyperdrive */
        #hyperdrive {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: none;
            background: black;
        }

        .star-streak {
            position: absolute;
            background: white;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            opacity: 0;
        }

        /* Schermate Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 0, 10, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: opacity 0.8s ease;
        }

        h1 { 
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 10vw, 6rem); 
            color: #e0aaff; 
            text-shadow: 0 0 30px rgba(224, 170, 255, 0.6);
            margin-bottom: 10px;
            letter-spacing: 15px;
        }

        button {
            padding: 18px 60px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            background: transparent;
            color: #e0aaff;
            border: 1px solid #e0aaff;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            z-index: 101;
        }

        button:hover {
            background: #e0aaff;
            color: #050010;
            box-shadow: 0 0 40px rgba(224, 170, 255, 0.4);
        }

        #game-container { position: relative; border: 1px solid rgba(224, 170, 255, 0.2); }
        canvas { display: block; cursor: crosshair; }

        #ui-top {
            position: absolute; top: -50px; width: 100%;
            display: flex; justify-content: space-between;
            font-family: 'Cinzel', serif; font-size: 1rem; color: #e0aaff;
        }

        .hidden { display: none !important; }

        @keyframes hyperdrive-anim {
            from { transform: translateZ(0); opacity: 1; }
            to { transform: translateZ(1000px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="space-bg"></div>
    <div id="hyperdrive"></div>

    <!-- Schermata Iniziale -->
    <div id="home-screen" class="overlay">
        <h1>PLANET HER</h1>
        <p style="letter-spacing: 5px; opacity: 0.8; margin-bottom: 40px;">ROYALE SNAKE ODYSSEY</p>
        <button onclick="triggerHyperdrive()">START MISSION</button>
    </div>

    <!-- Schermata Risultati -->
    <div id="result-screen" class="overlay hidden">
        <h2 id="result-title" style="font-family:'Cinzel'; color:#ff00ff; font-size:3rem;">LEVEL COMPLETE</h2>
        <div class="stats" id="result-stats" style="font-size: 1.5rem; margin: 20px 0;"></div>
        <button id="result-btn"></button>
    </div>

    <div id="game-container" class="hidden">
        <div id="ui-top">
            <span>Level: <span id="lvl-val">1</span></span>
            <span>Food: <span id="food-count">0</span>/10</span>
            <span>Score: <span id="score-val">0</span></span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 40;
        
        let level = 1;
        let score = 0;
        let foodsEatenInLevel = 0;
        let totalFoodsList = [];
        let snake = [];
        let food = {x: 0, y: 0};
        let dx = gridSize, dy = 0;
        let nextDx = gridSize, nextDy = 0;
        let gameInterval;
        let isMouseDown = false;

        // Palette Planet Her per il corpo del serpente
        const colorPalette = ["#ff00ff", "#e0aaff", "#9d4edd", "#7b2cbf", "#5a189a", "#3c096c", "#240046", "#ff5dff"];

        const foodList = [
            { name: "Carota", icon: "🥕" }, { name: "Broccolo", icon: "🥦" }, { name: "Melanzana", icon: "🍆" },
            { name: "Bistecca", icon: "🥩" }, { name: "Pollo", icon: "🍗" }, { name: "Salsiccia", icon: "🌭" },
            { name: "Baguette", icon: "🥖" }, { name: "Pasta", icon: "🍝" }, { name: "Torta", icon: "🍰" }
        ];

        // --- EFFETTO IPERSPAZIO ---
        function triggerHyperdrive() {
            const home = document.getElementById('home-screen');
            const drive = document.getElementById('hyperdrive');
            home.style.opacity = '0';
            drive.style.display = 'block';

            // Crea scie di stelle
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.className = 'star-streak';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                drive.appendChild(star);

                const duration = 0.5 + Math.random() * 1;
                star.animate([
                    { width: '2px', height: '2px', opacity: 0, transform: 'scale(1)' },
                    { width: '2px', height: '150px', opacity: 1, transform: 'scale(1.5)', offset: 0.5 },
                    { width: '1px', height: '400px', opacity: 0, transform: 'scale(2)' }
                ], {
                    duration: duration * 1000,
                    easing: 'ease-in',
                    fill: 'forwards'
                });
            }

            setTimeout(() => {
                home.classList.add('hidden');
                drive.style.opacity = '0';
                setTimeout(() => {
                    drive.style.display = 'none';
                    document.getElementById('game-container').classList.remove('hidden');
                    startGame();
                }, 500);
            }, 1500);
        }

        function startGame() {
            resetLevel();
        }

        function resetLevel() {
            canvas.width = Math.floor((window.innerWidth * 0.8) / gridSize) * gridSize;
            canvas.height = Math.floor((window.innerHeight * 0.7) / gridSize) * gridSize;
            
            // Inizializza serpente con colori
            snake = [
                {x: 5 * gridSize, y: 5 * gridSize, color: colorPalette[0]},
                {x: 4 * gridSize, y: 5 * gridSize, color: colorPalette[1]}
            ];
            
            dx = gridSize; dy = 0; nextDx = gridSize; nextDy = 0;
            foodsEatenInLevel = 0;
            updateUI();
            spawnFood();
            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 180); 
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            food.data = foodList[Math.floor(Math.random() * foodList.length)];
        }

        function gameLoop() {
            dx = nextDx; dy = nextDy;
            const head = { 
                x: snake[0].x + dx, 
                y: snake[0].y + dy, 
                color: snake[0].color // Mantiene colore testa
            };

            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame(false);
                return;
            }

            // Mangia Cibo
            if (head.x === food.x && head.y === food.y) {
                score += (10 * level);
                foodsEatenInLevel++;
                totalFoodsList.push(food.data.icon);
                
                // Nuovo pezzo con colore casuale dalla palette
                const newColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                snake.unshift({...head, color: newColor}); 
                
                updateUI();
                if (foodsEatenInLevel >= 10) endGame(true);
                else spawnFood();
            } else {
                snake.unshift(head);
                snake.pop();
            }
            draw();
        }

        function updateUI() {
            document.getElementById('lvl-val').innerText = level;
            document.getElementById('food-count').innerText = foodsEatenInLevel;
            document.getElementById('score-val').innerText = score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Cibo
            ctx.font = "32px serif";
            ctx.textAlign = "center";
            ctx.fillText(food.data.icon, food.x + gridSize/2, food.y + gridSize/2 + 8);

            // Serpente
            snake.forEach((part, i) => {
                const isHead = i === 0;
                
                // Effetto Glow per ogni pezzo
                ctx.shadowBlur = 15;
                ctx.shadowColor = part.color;

                let grad = ctx.createRadialGradient(part.x + 20, part.y + 20, 5, part.x + 20, part.y + 20, 22);
                grad.addColorStop(0, part.color);
                grad.addColorStop(1, "#000");
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(part.x + 2, part.y + 2, gridSize - 4, gridSize - 4, 15);
                ctx.fill();
                ctx.shadowBlur = 0;

                if (isHead) {
                    // Occhi Rossi Socchiusi
                    ctx.fillStyle = "red";
                    ctx.fillRect(part.x + 6, part.y + 12, 12, 4);
                    ctx.fillRect(part.x + 22, part.y + 12, 12, 4);
                    ctx.fillStyle = "black";
                    ctx.fillRect(part.x + 6, part.y + 14, 12, 1);
                    ctx.fillRect(part.x + 22, part.y + 14, 12, 1);
                }
            });
        }

        function endGame(isWin) {
            clearInterval(gameInterval);
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const stats = document.getElementById('result-stats');
            const btn = document.getElementById('result-btn');

            screen.classList.remove('hidden');
            screen.style.opacity = '1';

            if (isWin) {
                title.innerText = "ASCENSION SUCCESSFUL";
                stats.innerHTML = `Score: ${score}<br>Diet: ${totalFoodsList.slice(-10).join(' ')}`;
                btn.innerText = "NEXT LEVEL";
                btn.onclick = () => { level++; screen.classList.add('hidden'); resetLevel(); };
            } else {
                title.innerText = "COSMIC COLLISION";
                stats.innerHTML = `Reached Level ${level}<br>Final Score: ${score}`;
                btn.innerText = "RESURRECT";
                btn.onclick = () => { screen.classList.add('hidden'); resetLevel(); };
            }
        }

        // --- CONTROLLI ---
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -gridSize; }
            else if (e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = gridSize; }
            else if (e.key === "ArrowLeft" && dx === 0) { nextDx = -gridSize; nextDy = 0; }
            else if (e.key === "ArrowRight" && dx === 0) { nextDx = gridSize; nextDy = 0; }
        });

        canvas.addEventListener("mousemove", e => {
            if (isMouseDown) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const head = snake[0];
                const diffX = mouseX - (head.x + gridSize/2);
                const diffY = mouseY - (head.y + gridSize/2);
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 20 && dx === 0) { nextDx = gridSize; nextDy = 0; }
                    else if (diffX < -20 && dx === 0) { nextDx = -gridSize; nextDy = 0; }
                } else {
                    if (diffY > 20 && dy === 0) { nextDx = 0; nextDy = gridSize; }
                    else if (diffY < -20 && dy === 0) { nextDx = 0; nextDy = -gridSize; }
                }
            }
        });
        canvas.addEventListener("mousedown", () => isMouseDown = true);
        window.addEventListener("mouseup", () => isMouseDown = false);
    </script>
</body>
</html>
